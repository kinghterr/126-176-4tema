<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Строчно-блочные элементы</title>
<style>
.inline-block1 { width: 100px; height: 100px; border: 1px solid red; display: inline-block; margin-bottom: 10px; }
.inline-block2 { height: 100px; border: 1px solid red; display: inline-block; margin-bottom: 10px; }
.inline-block3 { width: 100px; border: 1px solid red; display: inline-block; margin-bottom: 10px; }
.inline-block-list { width: 100px; height: 100px; margin: 0 5px 20px 0; border: 1px solid red; display: inline-block; }
</style>
</head>
<body>

<span class="inline-block1">text</span>
<span class="inline-block2">text</span>
<span class="inline-block3">text</span>

<div class="inline-block-list">text 1</div>
<div class="inline-block-list">text 2</div>
<div class="inline-block-list">text 3</div>

</body>
</html>
